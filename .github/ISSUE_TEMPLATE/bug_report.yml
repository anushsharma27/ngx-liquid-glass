name: Bug report
description: Report reproducible incorrect behavior in ngx-liquid-glass
title: "[Bug]: "
labels: [bug, triage]
body:
  - type: markdown
    attributes:
      value: Thanks for helping improve ngx-liquid-glass. Do not use this form for security vulnerabilities.
  - type: input
    id: package-version
    attributes:
      label: ngx-liquid-glass version
      placeholder: 0.0.6
    validations:
      required: true
  - type: input
    id: angular-version
    attributes:
      label: Angular version
      placeholder: 22.0.7
    validations:
      required: true
  - type: dropdown
    id: browser
    attributes:
      label: Browser or environment
      options:
        - Chrome or Edge
        - Safari
        - Firefox
        - Angular SSR
        - Other
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: Description
      description: Explain what happened and what you expected instead.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Minimal reproduction
      description: Provide a StackBlitz, repository, or minimal code sample and exact reproduction steps.
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      render: shell
  - type: checkboxes
    id: checks
    attributes:
      label: Submission checks
      options:
        - label: I searched existing issues and found no duplicate.
          required: true
        - label: I reproduced this with the latest package release.
          required: true
        - label: This report does not contain a security vulnerability.
          required: true
